README — FruitSmart Maintenance Schedule (OptiSigns-ready)

HOST ON GITHUB PAGES IN UNDER 5 MINUTES
1) Create a new GitHub repository.
2) Upload this file as /index.html in the repo root.
3) In GitHub, open Settings -> Pages.
4) Under Build and deployment, choose Deploy from a branch.
5) Select your main branch and /(root), then Save.
6) Use the Pages URL in OptiSigns.

OPTISIGNS WEBSITE APP SETTINGS
- App type: Website or Advanced Website App
- URL: your hosted index.html URL
- Refresh / update interval: 86400 seconds
- Page Height: 1080
- Zoom: 100%
- Scrolling: off / top position

HOW TO EDIT NEXT YEAR
1) Replace the scheduleData JSON block with next year's weeks.

name":"Gabriel Z.","site":"Grandview","color":"yellow"}],[{"name":"Martin Z.","site":"Grandview","color":"yellow"},{"name":"Gabriel Z.","site":"Grandview","color":"yellow"}]]}},{"start":"2027-01-11","end":"2027-01-17","banner":null,"shifts":{"dayOnly":[[{"name":"Noe M.","site":"Grandview","color":"red"}],[{"name":"Noe M.","site":"Grandview","color":"red"}],[{"name":"Jason W.","site":"Grandview","color":"purple"}],[{"name":"Jason W.","site":"Grandview","color":"purple"}],[{"name":"Noe M.","site":"Grandview","color":"red"}],[{"name":"Noe M.","site":"Grandview","color":"red"}],[{"name":"Noe M.","site":"Grandview","color":"red"}]],"day":[[{"name":"Kyle F.","site":"Grandview","color":"blue"},{"name":"Alex G.","site":"Grandview","color":"blue"}],[{"name":"Kyle F.","site":"Grandview","color":"blue"},{"name":"Alex G.","site":"Grandview","color":"blue"}],[{"name":"Collin H.","site":"Grandview","color":"orange"},{"name":"Leo G.","site":"Grandview","color":"orange"}],[{"name":"Collin H.","site":"Grandview","color":"orange"},{"name":"Leo G.","site":"Grandview","color":"orange"}],[{"name":"Kyle F.","site":"Grandview","color":"blue"},{"name":"Alex G.","site":"Grandview","color":"blue"}],[{"name":"Kyle F.","site":"Grandview","color":"blue"},{"name":"Alex G.","site":"Grandview","color":"blue"}],[{"name":"Kyle F.","site":"Grandview","color":"blue"},{"name":"Alex G.","site":"Grandview","color":"blue"}]],"night":[[{"name":"Brad P.","site":"Grandview","color":"green"},{"name":"Bob W.","site":"Grandview","color":"green"}],[{"name":"Brad P.","site":"Grandview","color":"green"},{"name":"Bob W.","site":"Grandview","color":"green"}],[{"name":"Martin Z.","site":"Grandview","color":"yellow"},{"name":"Gabriel Z.","site":"Grandview","color":"yellow"}],[{"name":"Martin Z.","site":"Grandview","color":"yellow"},{"name":"Gabriel Z.","site":"Grandview","color":"yellow"}],[{"name":"Brad P.","site":"Grandview","color":"green"},{"name":"Bob W.","site":"Grandview","color":"green"}],[{"name":"Brad P.","site":"Grandview","color":"green"},{"name":"Bob W.","site":"Grandview","color":"green"}],[{"name":"Brad P.","site":"Grandview","color":"green"},{"name":"Bob W.","site":"Grandview","color":"green"}]]}}]};

    const TEAM_MEMBERS = {
      blue: ["Kyle F.", "Alex G."],
      orange: ["Collin H.", "Leo G."],
      green: ["Brad P.", "Bob W."],
      yellow: ["Martin Z.", "Gabriel Z."],
      purple: ["Jason W."],
      red: ["Noe M."]
    };

    const LEGEND = [
      { color: "blue", label: "Kyle F. / Alex G." },
      { color: "orange", label: "Collin H. / Leo G." },
      { color: "green", label: "Brad P. / Bob W." },
      { color: "yellow", label: "Martin Z. / Gabriel Z." },
      { color: "purple", label: "Jason W." },
      { color: "red", label: "Noe M." }
    ];

    const WEEKDAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const SHIFTS = [
      { key: "dayOnly", label: "D-Only" },
      { key: "day", label: "Day" },
      { key: "night", label: "Night" }
    ];

    function toIso(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseIso(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function queryDate() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("date");
      if (!raw || !/^\d{4}-\d{2}-\d{2}$/.test(raw)) return null;
      const dt = parseIso(raw);
      return Number.isNaN(dt.getTime()) ? null : raw;
    }

    function fmtLong(iso) {
      return parseIso(iso).toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    }

    function fmtRange(startIso, endIso) {
      const a = parseIso(startIso);
      const b = parseIso(endIso);
      const sameMonth = a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth();
      if (sameMonth) return `${a.toLocaleDateString(undefined, { month: "short", day: "numeric" })} – ${b.getDate()}, ${b.getFullYear()}`;
      const sameYear = a.getFullYear() === b.getFullYear();
      if (sameYear) return `${a.toLocaleDateString(undefined, { month: "short", day: "numeric" })} – ${b.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })}`;
      return `${a.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })} – ${b.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })}`;
    }

    function weekIndex(activeIso) {
      const i = scheduleData.weeks.findIndex(w => activeIso >= w.start && activeIso <= w.end);
      if (i !== -1) return i;
      if (activeIso < scheduleData.weeks[0].start) return 0;
      return scheduleData.weeks.length - 1;
    }

    function normalizeEntries(entries) {
      if (!Array.isArray(entries) || !entries.length) return [];
      const byColor = new Map();
      const order = [];
      entries.forEach(entry => {
        if (!byColor.has(entry.color)) {
          byColor.set(entry.color, []);
          order.push(entry.color);
        }
        byColor.get(entry.color).push(entry);
      });
      const out = [];
      order.forEach(color => {
        const group = byColor.get(color);
        const members = TEAM_MEMBERS[color] || [];
        if (members.length === 2 && group.length === 1) {
          const existing = group[0];
          const partner = members.find(name => name !== existing.name);
          out.push(existing, { name: partner, site: "Grandview", color });
        } else if (members.length === 2 && group.length === 2) {
          const ordered = members.map(name => group.find(x => x.name === name)).filter(Boolean);
          out.push(...(ordered.length === 2 ? ordered : group));
        } else {
          out.push(...group);
        }
      });
      return out;
    }

    function prepareData() {
      if (scheduleData._prepared) return;
      scheduleData._prepared = true;
      scheduleData.weeks.forEach(week => {
        SHIFTS.forEach(shift => {
          week.shifts[shift.key] = week.shifts[shift.key].map(normalizeEntries);
        });
      });
      const shutdownWeek = scheduleData.weeks.find(w => w.start === "2026-04-27");
      if (shutdownWeek) {
        const down = [{ name: "Scheduled Down Days", site: "Grandview", color: "neutral", type: "down" }];
        [0,1,2,3].forEach(day => {
          SHIFTS.forEach(shift => {
            shutdownWeek.shifts[shift.key][day] = down.map(x => ({ ...x }));
          });
        });
      }
    }

    function makeChip(person) {
      if (person.type === "down") {
        return `<div class="chip down">${person.name}</div>`;
      }
      const badge = person.site === "Prosser" ? `<span class="prosser-pill">Prosser</span>` : "";
      return `<div class="chip" data-color="${person.color}"><span>${person.name}</span>${badge}</div>`;
    }

    function renderLegend() {
      const el = document.getElementById("legend");
      const items = LEGEND.map(item => `<div class="legend-item"><span class="swatch" data-color="${item.color}"></span><span>${item.label}</span></div>`).join("");
      const prosser = `<div class="legend-item"><span class="prosser-pill">Prosser</span><span>Assigned to Prosser</span></div>`;
      el.innerHTML = items + prosser;
    }

    function setHeader(activeIso) {
      document.getElementById("activeDate").textContent = fmtLong(activeIso);
    }

    function setCardHeader(prefix, week) {
      if (!week) return;
      const start = parseIso(week.start);
      document.getElementById(`${prefix}Title`).textContent = `Week of ${start.toLocaleDateString(undefined, { month: "short", day: "numeric" })}`;
      document.getElementById(`${prefix}Range`).textContent = fmtRange(week.start, week.end);
      const banner = document.getElementById(`${prefix}Banner`);
      if (week.banner) {
        banner.textContent = week.banner;
        banner.style.display = "inline-flex";
      } else {
        banner.textContent = "";
        banner.style.display = "none";
      }
    }

    function renderCurrentWeek(week, activeIso) {
      const grid = document.getElementById("currentGrid");
      let html = `<div class="corner"></div>`;
      const start = parseIso(week.start);
      for (let i = 0; i < 7; i++) {
        const date = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
        const iso = toIso(date);
        html += `<div class="day-head ${iso === activeIso ? 'today' : ''}">
          ${iso === activeIso ? '<div class="today-tag">Today</div>' : ''}
          <div class="dow">${WEEKDAYS[i]}</div>
          <div class="dom">${date.getDate()}</div>
          <div class="mon">${date.toLocaleDateString(undefined, { month: 'short' })}</div>
        </div>`;
      }
      SHIFTS.forEach(shift => {
        html += `<div class="shift-label">${shift.label}</div>`;
        week.shifts[shift.key].forEach((entries, i) => {
          const date = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
          const iso = toIso(date);
          if (!entries.length) {
            html += `<div class="shift-cell empty ${iso === activeIso ? 'today' : ''}">—</div>`;
          } else {
            html += `<div class="shift-cell ${iso === activeIso ? 'today' : ''}">${entries.map(makeChip).join('')}</div>`;
          }
        });
      });
      grid.innerHTML = html;
    }

    function renderNextWeek(week, activeIso) {
      const list = document.getElementById("nextList");
      if (!week) {
        list.innerHTML = `<div class="empty-state">No later week loaded.</div>`;
        document.getElementById("nextTitle").textContent = "No later week loaded";
        document.getElementById("nextRange").textContent = "";
        const banner = document.getElementById("nextBanner");
        banner.style.display = "none";
        banner.textContent = "";
        return;
      }
      const start = parseIso(week.start);
      list.innerHTML = Array.from({ length: 7 }, (_, i) => {
        const date = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
        const iso = toIso(date);
        const rows = SHIFTS.map(shift => {
          const items = week.shifts[shift.key][i];
          return `<div class="preview-shift">
            <div class="preview-shift-label">${shift.label}</div>
            <div class="preview-chip-wrap">${items.length ? items.map(makeChip).join('') : '<div class="preview-empty">—</div>'}</div>
          </div>`;
        }).join('');
        return `<div class="preview-day ${iso === activeIso ? 'today' : ''}">
          <div class="preview-date">
            <div class="preview-dow">${WEEKDAYS[i]}</div>
            <div class="preview-dom">${date.getDate()}</div>
            <div class="preview-mon">${date.toLocaleDateString(undefined, { month: 'short' })}</div>
          </div>
          <div class="preview-shifts">${rows}</div>
        </div>`;
      }).join('');
    }

    function render() {
      prepareData();
      renderLegend();
      const activeIso = queryDate() || toIso(new Date());
      const idx = weekIndex(activeIso);
      const current = scheduleData.weeks[idx];
      const next = scheduleData.weeks[idx + 1] || null;
      setHeader(activeIso);
      setCardHeader('current', current);
      setCardHeader('next', next || { start: current.end, end: current.end, banner: null });
      renderCurrentWeek(current, activeIso);
      renderNextWeek(next, activeIso);
    }

    function scheduleRefresh() {
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 1, 0, 0);
      const delay = Math.max(next.getTime() - now.getTime(), 1000);
      setTimeout(() => location.reload(), delay);
    }

    render();
    scheduleRefresh();
  </script>
