<!--
================================================================================
  FRUITSMART MAINTENANCE SCHEDULE
  Auto-rolling weekly display for OptiSigns / shop-floor TV.
  Designed for 1920 × 1080 (1080p). Auto-scales to any 16:9 viewport.
================================================================================

  HOW TO HOST ON GITHUB PAGES  (≈5 min)
  -------------------------------------
  1. github.com → new PUBLIC repo, e.g. "maintenance-schedule".
  2. Add file → Upload files → drag this file in (keep name exactly
     "index.html"), commit to main.
  3. Repo → Settings → Pages.
       Source: "Deploy from a branch"
       Branch: main  /  folder: "/ (root)"  → Save.
  4. Wait ~60 sec. URL: https://<your-username>.github.io/maintenance-schedule/

  OPTISIGNS WEBSITE APP SETTINGS (42" 1080p TV)
  ---------------------------------------------
     URL:            https://<your-username>.github.io/maintenance-schedule/
     Refresh Rate:   Every 60 minutes  (page also self-rolls at midnight)
     Page Width:     1920
     Page Height:    1080
     Zoom:           100%
     Fit to Screen:  ON  (or "Stretch" / "Fill screen" depending on version)
     Disable Scroll: YES
  If the TV shows scrollbars or cuts off the bottom, switch OptiSigns to
  "Fit to screen" and confirm TV input is set to 1080p.

  TESTING ON YOUR COMPUTER
  ------------------------
  The page auto-scales to your browser window. On smaller screens it will
  look proportionally smaller — that's the intended 42" TV view shrunk to
  fit. F11 to full-screen for the best preview.

  TESTING A FUTURE WEEK
  ---------------------
  Append ?date=YYYY-MM-DD, e.g.  https://.../?date=2026-07-15

  UPDATING THE SCHEDULE NEXT YEAR
  -------------------------------
  Scroll to:   /* === SCHEDULE DATA — edit yearly === */
  Replace SCHEDULE.weeks with next year's weeks. Shape of each week:
    {
      "start":  "YYYY-MM-DD",          // Monday
      "end":    "YYYY-MM-DD",          // Sunday
      "banner": null | "SUPERVISORS" | "MECHANICS",
      "shifts": {
        "dayOnly": [ [cell0],...[cell6] ],   // Mon..Sun
        "day":     [ [cell0],...[cell6] ],
        "night":   [ [cell0],...[cell6] ]
      }
    }
  Each cell is an array of { "name": "Full Name", "prosser": true? }.
  The page auto-adds the Grandview teammate when one person is at Prosser,
  so you only need to enter the Prosser person.

  Supported names (case-sensitive):
     Kyle F. / Alex G.        Collin H. / Leo G.
     Brad P. / Bob W.         Martin Z. / Gabriel Z.
     Jason W. (solo)          Noe M. (solo)
================================================================================
-->

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    /* Team colors — deeper industrial workshop palette */
    --blue:   #3A7A98;
    --orange: #B06730;
    --green:  #4E8046;
    --yellow: #A58522;
    --purple: #7A4E84;
    --red:    #9B3E32;

    /* Neutral industrial palette */
    --bg:         #EBE8DD;   /* warm stone */
    --surface:    #F4F2EB;
    --panel:      #E3DFD1;
    --border:     #C9C4B2;
    --ink:        #1A1915;
    --ink-sub:    #504D44;
    --ink-dim:    #8C887C;
    --accent:     #B54B28;   /* deep terracotta */
    --on-cell:    #F4F2EB;   /* text on colored cells */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #D9D4C3;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { display: grid; place-items: center; }

  /* Fixed 1920x1080 stage, scaled to viewport, hard-clipped so nothing spills */
  .scaler {
    width: 1920px;
    height: 1080px;
    transform-origin: center center;
    transform: scale(min(100vw / 1920, 100vh / 1080));
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  .stage {
    width: 100%;
    height: 100%;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    background: var(--bg);
  }

  /* ===== TOP BAR ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 40px;
    padding-bottom: 4px;
  }
  .week-range {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 68px;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--ink);
    text-transform: uppercase;
  }
  .switch-chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: var(--accent);
    color: var(--on-cell);
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .switch-chip.hidden { display: none; }
  .switch-chip .dot {
    width: 8px; height: 8px;
    background: var(--on-cell);
    display: inline-block;
  }

  /* ===== OOR BANNER ===== */
  .oor-banner {
    background: transparent;
    border: 1px solid var(--accent);
    border-left-width: 4px;
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .oor-banner.hidden { display: none; }

  /* ===== MAIN GRID ===== */
  .grid {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 120px repeat(7, 1fr);
    grid-template-rows: 84px 1fr 1fr 1fr;
    gap: 2px;
    background: var(--border);
    border: 2px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .grid .corner { background: var(--surface); }

  .day-head {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    position: relative;
  }
  .day-head .dow {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .day-head .dnum {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 44px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -1px;
  }
  .day-head.today {
    background: var(--accent);
  }
  .day-head.today .dow { color: var(--on-cell); opacity: 0.85; }
  .day-head.today .dnum { color: var(--on-cell); }

  .row-label {
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 8px;
  }
  .row-label .rl-main {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.1;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink-sub);
  }

  .cell {
    position: relative;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    justify-content: stretch;
    align-items: stretch;
    gap: 0;
    color: var(--on-cell);
    overflow: hidden;
  }
  .cell[data-color="blue"]   { background: var(--blue); }
  .cell[data-color="orange"] { background: var(--orange); }
  .cell[data-color="green"]  { background: var(--green); }
  .cell[data-color="yellow"] { background: var(--yellow); }
  .cell[data-color="purple"] { background: var(--purple); }
  .cell[data-color="red"]    { background: var(--red); }
  .cell[data-color=""]       { background: var(--surface); color: #B5B09F; }
  .cell[data-color=""]::before {
    content: "—";
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 500;
  }

  .person {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex: 1;
    min-height: 0;
  }
  .person + .person {
    border-top: 1px solid rgba(244, 242, 235, 0.25);
  }
  .person .name {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 26px;
    line-height: 1.02;
    letter-spacing: -0.3px;
    text-align: center;
    text-transform: uppercase;
  }
  .person .prosser-tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px 3px;
    background: rgba(26, 25, 21, 0.75);
    color: var(--on-cell);
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .cell.one-person .person .name { font-size: 32px; }

  /* ===== NEXT WEEK ===== */
  .nextweek {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 18px 14px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
    height: 184px;
  }
  .nextweek-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  .nextweek-head .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3.5px;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .nextweek-head .range {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--ink);
    text-transform: uppercase;
  }
  .nextweek-head .mini-switch {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 5px 10px;
    background: var(--accent);
    color: var(--on-cell);
    border-radius: 3px;
    text-transform: uppercase;
  }
  .nextweek-head .mini-switch.hidden { display: none; }

  .mini-grid {
    display: grid;
    grid-template-columns: 84px repeat(7, 1fr);
    grid-template-rows: 22px 1fr 1fr 1fr;
    gap: 2px;
  }
  .mini-cell {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
  }
  .mini-cell.mhead {
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .mini-cell.mrl {
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-sub);
  }
  .mini-cell[data-color] {
    color: var(--on-cell);
    padding: 4px 0;
  }
  .mini-cell[data-color="blue"]   { background: var(--blue); }
  .mini-cell[data-color="orange"] { background: var(--orange); }
  .mini-cell[data-color="green"]  { background: var(--green); }
  .mini-cell[data-color="yellow"] { background: var(--yellow); }
  .mini-cell[data-color="purple"] { background: var(--purple); }
  .mini-cell[data-color="red"]    { background: var(--red); }
  .mini-cell[data-color=""]       { background: var(--bg); color: var(--ink-dim); }

  .mini-cell .ini-row {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .mini-cell .p-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    background: rgba(26, 25, 21, 0.82);
    color: var(--on-cell);
    padding: 2px 4px 2.5px;
    border-radius: 2px;
    line-height: 1;
  }
</style>
</head>
<body>
<div class="scaler">
<div class="stage">

  <header class="topbar">
    <h1 class="week-range" id="week-range">—</h1>
    <div class="switch-chip hidden" id="switch-chip">

    </div>
  </header>

  <div class="oor-banner hidden" id="oor-banner"></div>

  <div class="grid" id="main-grid"></div>

  <section class="nextweek">
    <div class="nextweek-head">
      <span class="tag">Next Week</span>
      <span class="range" id="next-range">—</span>
      <span class="mini-switch hidden" id="next-switch">Switch Next Week</span>
    </div>
    <div class="mini-grid" id="next-grid"></div>
  </section>

</div>
</div>

const NAME_TO_COLOR = {
  "Kyle F.": "blue",    "Alex G.": "blue",
  "Collin H.": "orange","Leo G.": "orange",
  "Brad P.": "green",   "Bob W.": "green",
  "Martin Z.": "yellow","Gabriel Z.": "yellow",
  "Jason W.": "purple",
  "Noe M.": "red"
};
const NAME_TO_INITIALS = {
  "Kyle F.": "KF",   "Alex G.": "AG",
  "Collin H.": "CH", "Leo G.": "LG",
  "Brad P.": "BP",   "Bob W.": "BW",
  "Martin Z.": "MZ", "Gabriel Z.": "GZ",
  "Jason W.": "JW",
  "Noe M.": "NM"
};
const TEAMMATE = {
  "Kyle F.":   "Alex G.",    "Alex G.":   "Kyle F.",
  "Collin H.": "Leo G.",     "Leo G.":    "Collin H.",
  "Brad P.":   "Bob W.",     "Bob W.":    "Brad P.",
  "Martin Z.": "Gabriel Z.", "Gabriel Z.":"Martin Z."
};

const DOW = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseISO(iso) { return new Date(iso + "T12:00:00"); }
function fmtDate(iso) {
  const d = parseISO(iso);
  return `${MONTHS[d.getMonth()]} ${d.getDate()}`;
}
function isoForLocalDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function getEffectiveDate() {
  const params = new URLSearchParams(location.search);
  const d = params.get("date");
  if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) return parseISO(d);
  return new Date();
}
function findWeekIndex(iso, weeks) {
  for (let i = 0; i < weeks.length; i++) {
    if (iso >= weeks[i].start && iso <= weeks[i].end) return { index: i, mode: "current" };
  }
  if (iso < weeks[0].start) return { index: 0, mode: "before" };
  return { index: weeks.length - 1, mode: "after" };
}

function expandCell(cell) {
  if (!cell || cell.length === 0) return [];
  const names = new Set(cell.map(p => p.name));
  const out = cell.slice();
  for (const p of cell) {
    if (p.prosser) {
      const mate = TEAMMATE[p.name];
      if (mate && !names.has(mate)) {
        out.push({ name: mate });
        names.add(mate);
      }
    }
  }
  return out;
}
function colorOf(cell) {
  if (!cell || cell.length === 0) return "";
  return NAME_TO_COLOR[cell[0].name] || "";
}

function renderCell(rawCell, isToday) {
  const cell = expandCell(rawCell);
  const div = document.createElement("div");
  div.className = "cell";
  if (isToday) div.classList.add("today-col");
  const color = colorOf(cell);
  div.dataset.color = color;
  if (!cell || cell.length === 0) return div;
  if (cell.length === 1) div.classList.add("one-person");
  for (const person of cell) {
    const row = document.createElement("div");
    row.className = "person";
    const n = document.createElement("div");
    n.className = "name";
    n.textContent = person.name;
    row.appendChild(n);
    if (person.prosser) {
      const pill = document.createElement("div");
      pill.className = "prosser-tag";
      pill.textContent = "Prosser";
      row.appendChild(pill);
    }
    div.appendChild(row);
  }
  return div;
}

function renderMiniCell(rawCell) {
  const cell = expandCell(rawCell);
  const div = document.createElement("div");
  div.className = "mini-cell";
  const color = colorOf(cell);
  if (!color) {
    div.textContent = "–";
    return div;
  }
  div.dataset.color = color;
  for (const person of cell) {
    const row = document.createElement("div");
    row.className = "ini-row";
    const ini = document.createElement("span");
    ini.textContent = NAME_TO_INITIALS[person.name] || "";
    row.appendChild(ini);
    if (person.prosser) {
      const pm = document.createElement("span");
      pm.className = "p-mark";
      pm.textContent = "P";
      row.appendChild(pm);
    }
    div.appendChild(row);
  }
  return div;
}

function render() {
  const now = getEffectiveDate();
  const iso = isoForLocalDate(now);

  const weeks = SCHEDULE.weeks;
  const loc = findWeekIndex(iso, weeks);
  const oor = document.getElementById("oor-banner");
  if (loc.mode === "before") {
    oor.classList.remove("hidden");
    oor.textContent = "Schedule starts " + fmtDate(weeks[0].start) + " — showing first week";
  } else if (loc.mode === "after") {
    oor.classList.remove("hidden");
    oor.textContent = "Schedule ended " + fmtDate(weeks[weeks.length - 1].end) + " — update required";
  } else {
    oor.classList.add("hidden");
  }

  const week = weeks[loc.index];
  const nextWeek = weeks[loc.index + 1] || null;

  document.getElementById("week-range").textContent =
    fmtDate(week.start) + " — " + fmtDate(week.end);

  const chip = document.getElementById("switch-chip");
  const switchText = document.getElementById("switch-text");
  if (week.banner) {
    chip.classList.remove("hidden");
    switchText.textContent = week.banner + " Switch This Week";
  } else {
    chip.classList.add("hidden");
  }

  let todayCol = -1;
  if (loc.mode === "current") {
    const start = parseISO(week.start);
    const diff = Math.round((now.setHours(12,0,0,0) - start.getTime()) / 86400000);
    if (diff >= 0 && diff <= 6) todayCol = diff;
  }

  const grid = document.getElementById("main-grid");
  grid.innerHTML = "";

  const corner = document.createElement("div");
  corner.className = "corner";
  grid.appendChild(corner);

  for (let i = 0; i < 7; i++) {
    const d = new Date(parseISO(week.start).getTime() + i * 86400000);
    const head = document.createElement("div");
    head.className = "day-head" + (i === todayCol ? " today" : "");
    head.innerHTML = `<div class="dow">${DOW[i]}</div><div class="dnum">${d.getDate()}</div>`;
    grid.appendChild(head);
  }

  const shifts = [
    { key: "dayOnly", label: "Day-Only" },
    { key: "day",     label: "Day"      },
    { key: "night",   label: "Night"    }
  ];
  for (const s of shifts) {
    const rl = document.createElement("div");
    rl.className = "row-label";
    rl.innerHTML = `<div class="rl-main">${s.label}</div>`;
    grid.appendChild(rl);
    const row = week.shifts[s.key];
    for (let i = 0; i < 7; i++) {
      grid.appendChild(renderCell(row[i] || [], i === todayCol));
    }
  }

  const nxt = document.getElementById("next-grid");
  const nxtRange = document.getElementById("next-range");
  const nxtSwitch = document.getElementById("next-switch");
  nxt.innerHTML = "";
  if (nextWeek) {
    nxtRange.textContent = fmtDate(nextWeek.start) + " — " + fmtDate(nextWeek.end);
    if (nextWeek.banner) {
      nxtSwitch.classList.remove("hidden");
      nxtSwitch.textContent = nextWeek.banner + " Switch Next Week";
    } else {
      nxtSwitch.classList.add("hidden");
    }
    const corner2 = document.createElement("div");
    corner2.className = "mini-cell mhead";
    nxt.appendChild(corner2);
    for (let i = 0; i < 7; i++) {
      const d = new Date(parseISO(nextWeek.start).getTime() + i * 86400000);
      const head = document.createElement("div");
      head.className = "mini-cell mhead";
      head.textContent = DOW[i] + " " + d.getDate();
      nxt.appendChild(head);
    }
    for (const s of shifts) {
      const rl = document.createElement("div");
      rl.className = "mini-cell mrl";
      rl.textContent = s.label;
      nxt.appendChild(rl);
      const row = nextWeek.shifts[s.key];
      for (let i = 0; i < 7; i++) {
        nxt.appendChild(renderMiniCell(row[i] || []));
      }
    }
  } else {
    nxtRange.textContent = "End of schedule";
    nxtSwitch.classList.add("hidden");
  }
}

render();
function scheduleMidnightRefresh() {
  const now = new Date();
  const t = new Date(now);
  t.setHours(24, 0, 30, 0);
  setTimeout(() => { render(); scheduleMidnightRefresh(); }, t - now);
}
scheduleMidnightRefresh();
setInterval(render, 60 * 60 * 1000);
