<!DOCTYPE html>
<!--
README — FruitSmart Maintenance Schedule (OptiSigns-ready)

HOST ON GITHUB PAGES IN UNDER 5 MINUTES
1) Create a new GitHub repository.
2) Upload this file as /index.html in the repo root.
3) Open the repo -> Settings -> Pages.
4) Under Build and deployment, choose "Deploy from a branch".
5) Select your main branch and /(root), then Save.
6) Wait a minute or two. Your URL will be:
   - https://YOUR-USERNAME.github.io/REPO-NAME/
   - or https://YOUR-USERNAME.github.io/ if the repo name is YOUR-USERNAME.github.io

RECOMMENDED OPTISIGNS SETTINGS
Use the Advanced Website App so you can set Page Height and Zoom.
- URL: your hosted index.html URL
- Scroll Type: Scroll to
- Scroll Position: 0
- Page Height: 1080
- Zoom: 100
- Update Interval: 86400 seconds (24 hours)
- Render Engine: Normal / default
- Assign the asset directly to the screen or put it in a playlist

HOW TO EDIT NEXT YEAR
1) Keep the PEOPLE / TEAM_COLORS section if names and colors stay the same.
2) Replace scheduleData.weeks with the next yearly schedule.
3) Each week must have:
   - start: Monday in YYYY-MM-DD
   - end: Sunday in YYYY-MM-DD
   - banner: null or a switch banner string
   - shifts.dayOnly / shifts.day / shifts.night: 7 arrays each (Mon-Sun)
4) For Grandview entries, use site: "Grandview".
5) For Prosser entries, use site: "Prosser".
6) Test future weeks with:
   - ?date=2026-07-15
   - ?date=2027-01-04
-->

    .pill {

      font-weight: 600;
      line-height: 1;
      white-space: nowrap;

    .pill .dot {

      height: 10px;
      border-radius: 999px;
      background: #0f172a;
      opacity: 0.8;
    }

    .team-pill {

      gap: 8px;
      align-items: start;

      font-size: 12px;

    [data-color="green"] { background: var(--green); }
    [data-color="yellow"] { background: var(--yellow); }
    [data-color="purple"] { background: var(--purple); }
    [data-color="red"] { background: var(--red); }

      .card {

    }

    @media (max-width: 980px) {
      body { padding: 14px; }
      .shell { min-height: auto; }
      .hero-top,
      .card-head {
        flex-direction: column;
      }
      .week-grid {
        grid-template-columns: 92px repeat(7, minmax(120px, 1fr));
        overflow-x: auto;
        padding-bottom: 4px;
      }
    }

    function toLocalIso(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseIso(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function getRequestedDate() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("date");
      if (!raw) return null;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return null;
      const test = parseIso(raw);
      if (Number.isNaN(test.getTime())) return null;
      return raw;
    }

    function formatLong(iso) {
      return parseIso(iso).toLocaleDateString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function formatRange(startIso, endIso) {
      const start = parseIso(startIso);
      const end = parseIso(endIso);

      const sameYear = start.getFullYear() === end.getFullYear();
      const sameMonth = sameYear && start.getMonth() === end.getMonth();

      if (sameMonth) {
        return `${start.toLocaleDateString(undefined, { month: "short", day: "numeric" })} – ${end.getDate()}, ${end.getFullYear()}`;
      }

      if (sameYear) {
        return `${start.toLocaleDateString(undefined, { month: "short", day: "numeric" })} – ${end.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })}`;
      }

      return `${start.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })} – ${end.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })}`;
    }

    function getWeekIndex(activeIso) {
      const weeks = scheduleData.weeks;
      const exact = weeks.findIndex(week => activeIso >= week.start && activeIso <= week.end);
      if (exact !== -1) return exact;
      if (activeIso < weeks[0].start) return 0;
      if (activeIso > weeks[weeks.length - 1].end) return weeks.length - 1;
      return 0;
    }

    function makeChip(person) {
      if (person.kind === "note") {
        return `
          <div class="chip note-chip" data-color="note">
            <span class="chip-name">${person.name}</span>
          </div>
        `;
      }

      const isProsser = person.site === "Prosser";
      const prosserClass = isProsser ? "site-prosser" : "";
      return `
        <div class="chip ${prosserClass}" data-color="${person.color}">
          <span class="chip-name">${person.name}</span>
          ${isProsser ? '<span class="site-badge">Prosser</span>' : ""}
        </div>
      `;
    }

      const legend = document.getElementById("legend");
      const note = `<div class="pill"><span class="dot"></span><span>No badge = Grandview</span></div>
                    <div class="pill"><span class="dot" style="background: var(--prosser);"></span><span>Prosser badge = assigned to Prosser</span></div>
                    <div class="pill"><span class="dot" style="background: #64748b;"></span><span>Use ?date=YYYY-MM-DD to preview any week</span></div>`;
      const teams = TEAM_LEGEND.map(team => `
        <div class="pill team-pill" data-color="${team.color}">
          ${team.label}
        </div>
      `).join("");
      legend.innerHTML = teams + note;
    }

    function renderMeta(activeIso, usingTestDate) {
      const meta = document.getElementById("metaPills");
      const items = [
        `<div class="pill"><span class="dot"></span><span>Viewing: ${formatLong(activeIso)}</span></div>`,
        `<div class="pill"><span class="dot" style="background:#64748b;"></span><span>Refresh-ready for OptiSigns</span></div>`
      ];
      if (usingTestDate) {
        items.push(`<div class="pill"><span class="dot" style="background:#7c3aed;"></span><span>Test mode via ?date=${activeIso}</span></div>`);
      }
      meta.innerHTML = items.join("");
    }

    function buildCurrentWeekGrid(week, activeIso) {
      const grid = document.getElementById("currentWeekGrid");
      let html = `<div class="corner"></div>`;

      for (let i = 0; i < 7; i++) {
        const iso = toLocalIso(new Date(parseIso(week.start).getFullYear(), parseIso(week.start).getMonth(), parseIso(week.start).getDate() + i));
        const dt = parseIso(iso);
        const isToday = iso === activeIso;
        html += `
          <div class="day-head ${isToday ? "today" : ""}">
            ${isToday ? '<div class="today-tag">Today</div>' : ""}
            <div class="dow">${WEEKDAYS[i]}</div>
            <div class="dom">${dt.getDate()}</div>
            <div class="month-mini">${dt.toLocaleDateString(undefined, { month: "short" })}</div>
          </div>
        `;
      }

      SHIFT_CONFIG.forEach(shift => {
        html += `<div class="shift-label">${shift.label}</div>`;
        week.shifts[shift.key].forEach((peopleForDay, index) => {
          const iso = toLocalIso(new Date(parseIso(week.start).getFullYear(), parseIso(week.start).getMonth(), parseIso(week.start).getDate() + index));
          const isToday = iso === activeIso;
          if (!peopleForDay.length) {
            html += `<div class="shift-cell empty ${isToday ? "today" : ""}"><div class="empty-mark">—</div></div>`;
          } else {
            html += `<div class="shift-cell ${isToday ? "today" : ""}">${peopleForDay.map(makeChip).join("")}</div>`;
          }
        });
      });

      grid.innerHTML = html;
    }

    function renderWeekHeader(week, prefix, activeIso) {
      const weekOf = parseIso(week.start).toLocaleDateString(undefined, { month: "short", day: "numeric" });
      document.getElementById(`${prefix}Title`).textContent = `Week of ${weekOf}`;
      document.getElementById(`${prefix}Range`).textContent = formatRange(week.start, week.end);

      const banner = document.getElementById(`${prefix}Banner`);
      if (week.banner) {
        banner.hidden = false;
        banner.textContent = week.banner;
      } else {
        banner.hidden = true;
        banner.textContent = "";
      }
    }

    function renderNextWeek(week, activeIso) {
      const list = document.getElementById("nextWeekList");
      const noNext = document.getElementById("noNext");
      if (!week) {
        list.innerHTML = "";
        noNext.hidden = false;
        document.getElementById("nextTitle").textContent = "No later week loaded";
        document.getElementById("nextRange").textContent = "";
        document.getElementById("nextBanner").hidden = true;
        return;
      }

      noNext.hidden = true;
      renderWeekHeader(week, "next", activeIso);

      const start = parseIso(week.start);
      list.innerHTML = Array.from({ length: 7 }, (_, index) => {
        const date = new Date(start.getFullYear(), start.getMonth(), start.getDate() + index);
        const iso = toLocalIso(date);
        const isToday = iso === activeIso;

        const shiftHtml = SHIFT_CONFIG.map(shift => {
          const items = week.shifts[shift.key][index];
          const content = items.length
            ? `<div class="chip-wrap">${items.map(makeChip).join("")}</div>`
            : `<div class="muted-note">—</div>`;
          return `
            <div class="next-shift">
              <div class="next-shift-label">${shift.label === "Day Only" ? "D-Only" : shift.label}</div>
              <div>${content}</div>
            </div>
          `;
        }).join("");

        return `
          <div class="next-day ${isToday ? "today" : ""}">
            <div class="next-date">
              <div class="next-dow">${WEEKDAYS[index]}</div>
              <div class="next-dom">${date.getDate()}</div>
              <div class="next-month">${date.toLocaleDateString(undefined, { month: "short" })}</div>
            </div>
            <div class="next-shifts">${shiftHtml}</div>
          </div>
        `;
      }).join("");
    }

    function renderCoverageNote() {
      const first = scheduleData.weeks[0];
      const last = scheduleData.weeks[scheduleData.weeks.length - 1];
      document.getElementById("coverageNote").textContent = `Loaded schedule: ${formatRange(first.start, last.end)}`;
      document.getElementById("footerNote").textContent = "Built for 1920×1080 display. If you are previewing from a future date outside this range, the page will stop on the nearest loaded week.";
    }

    function render() {
      renderLegend();

      const testDate = getRequestedDate();
      const activeIso = testDate || toLocalIso(new Date());
      const index = getWeekIndex(activeIso);

      renderMeta(activeIso, Boolean(testDate));
      const currentWeek = scheduleData.weeks[index];
      const nextWeek = scheduleData.weeks[index + 1] || null;

      renderWeekHeader(currentWeek, "current", activeIso);
      buildCurrentWeekGrid(currentWeek, activeIso);
      renderNextWeek(nextWeek, activeIso);
      renderCoverageNote();
    }

    function scheduleMidnightRefresh() {
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 1, 0, 0);
      const delay = next.getTime() - now.getTime();
      window.setTimeout(() => window.location.reload(), Math.max(delay, 1000));
    }

    render();
    scheduleMidnightRefresh();
  </script>
</body>
</html>
